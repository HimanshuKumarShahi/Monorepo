version: '3.8'

services:
  whiteboard-app:
    image: node:18-alpine
    container_name: code-verse-workspace
    working_dir: /app
    # Tumhare system ka code direct container me link ho jayega
    volumes:
      - .:/app
      - /app/node_modules
    # Ye ports Express aur Vite ke liye hain
    ports:
      - "5000:5000"
      - "5173:5173"
    # Container start hote hi ye command chalegi
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev"